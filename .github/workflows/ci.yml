name: MLOps CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch stock data
        run: python src/ingest.py

      - name: Run feature engineering
        run: python src/features.py

      - name: Upgrade MLflow DB schema
        run: mlflow db upgrade sqlite:///mlflow.db

      - name: Train models & log to MLflow
        run: python src/train.py

      - name: Commit metrics
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
          
          # Track the new SQLite database
          git add -f mlflow.db
          
          # Safely handle mlruns just in case
          mkdir -p mlruns
          git add -f mlruns/
          git reset HEAD mlruns/**/artifacts/ || true
          
          git diff --staged --quiet || git commit -m "ci: update MLflow metrics [skip ci]"
          git push


      - name: Test API health
        run: |
          cd src && python serve.py &
          sleep 5
          curl -f http://localhost:8000/health

  docker:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build Docker image
        run: docker build -t indonesian-stock-mlops:latest .