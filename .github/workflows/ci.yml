name: MLOps CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyarrow vaderSentiment nltk

      - name: Fetch stock data
        run: python src/ingest.py

      - name: Run feature engineering (CI mode)
        env:
          FRED_API_KEY: dd8911c26b5abd28eab62d670dd0371e
        run: python scripts/ci_features.py

      - name: Build model index
        run: python scripts/build_model_index.py

      - name: Upgrade MLflow DB schema
        run: mlflow db upgrade sqlite:///mlflow.db

      - name: Train models & log to MLflow
        env:
          CI: "true"
        run: python src/train.py --features data/processed/features.csv

      - name: Commit metrics
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"

          git add -f mlflow.db
          mkdir -p mlruns
          git add -f mlruns/
          git reset HEAD mlruns/**/artifacts/ || true

          git diff --staged --quiet || git commit -m "ci: update MLflow metrics [skip ci]"
          git push

      - name: Test API health
        run: |
          cd src && python serve.py &
          sleep 30
          curl -f http://localhost:8000/health

  docker:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build Docker image
        run: docker build -t indonesian-stock-mlops:latest .