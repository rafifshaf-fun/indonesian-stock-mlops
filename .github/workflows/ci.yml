name: MLOps CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    permissions:
      contents: write  # ← Required to push mlruns back

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}  # ← Needed for push permission

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch stock data
        run: python src/ingest.py

      - name: Run feature engineering
        run: python src/features.py

      - name: Train models
        run: python src/train.py

      - name: Commit mlruns back to repo  # ← NEW
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
          git add mlruns/
          git diff --staged --quiet || git commit -m "ci: update mlruns after training [skip ci]"
          git push

      - name: Test API health
        run: |
          cd src && python serve.py &
          sleep 5
          curl -f http://localhost:8000/health

  docker:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build Docker image
        run: docker build -t indonesian-stock-mlops:latest .